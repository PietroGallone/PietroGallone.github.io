<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avviso</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff4d6;
    font-family: Arial, sans-serif;
}

#inizio {
    font-size: 60px;
}

#messaggio {
    display: none;
    background: white;
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    max-width: 320px;
}

h1 {
    font-size: 28px;
}

p {
    font-size: 21px;
}
</style>
</head>

<body>

<div id="inizio">📅🍦</div>

<div id="messaggio">
    <h1>📢 AVVISO</h1>
    <p><b>Giovedì 16 luglio</b></p>
    <p>Avrete il vostro gelato.</p>
    <p>L'orario ve lo diciamo dopo però 😏</p>
</div>

<script>
setTimeout(function(){
    document.getElementById("inizio").style.display = "none";
    document.getElementById("messaggio").style.display = "block";
}, 2000);
</script>

</body>
</html>
